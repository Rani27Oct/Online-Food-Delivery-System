<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Food Delivery System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🍔 Online Food Delivery System</h1>
    </header>

    <div class="container">

        <div class="card">
            <img src="https://images.pexels.com/photos/825661/pexels-photo-825661.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Pizza">
            <h2>Pizza</h2>
            <p>Price: ₹299</p>
            <button onclick="orderFood('Pizza')">Order Now</button>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/1639557/pexels-photo-1639557.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Burger">
            <h2>Burger</h2>
            <p>Price: ₹149</p>
            <button onclick="orderFood('Burger')">Order Now</button>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/699953/pexels-photo-699953.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Fried Rice">
            <h2>Fried Rice</h2>
            <p>Price: ₹199</p>
            <button onclick="orderFood('Fried Rice')">Order Now</button>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/1640777/pexels-photo-1640777.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Veg Thali">
            <h2>Veg Thali</h2>
            <p>Price: ₹249</p>
            <button onclick="orderFood('Veg Thali')">Order Now</button>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
