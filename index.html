<!DOCTYPE html>
<html>
<head>
    <title>Online Food Delivery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Online Food Delivery System</h1>

    <div class="card">
        <h2>Pizza</h2>
        <p>Price: ₹299</p>
        <button onclick="orderFood('Pizza')">Order Now</button>
    </div>

    <div class="card">
        <h2>Burger</h2>
        <p>Price: ₹149</p>
        <button onclick="orderFood('Burger')">Order Now</button>
    </div>

    <div class="card">
        <h2>Fried Rice</h2>
        <p>Price: ₹199</p>
        <button onclick="orderFood('Fried Rice')">Order Now</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
